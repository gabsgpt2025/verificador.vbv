name: Relatório de bug
description: Reporte um problema encontrado no projeto
title: "[BUG] "
labels:
  - bug
body:
  - type: textarea
    id: descricao
    attributes:
      label: Descrição
      description: Explique o problema de forma objetiva.
      placeholder: O que aconteceu?
    validations:
      required: true

  - type: textarea
    id: passos
    attributes:
      label: Passos para reproduzir
      description: Liste os passos para reproduzir o comportamento.
      placeholder: |
        1. Ir para '...'
        2. Clicar em '...'
        3. Ver erro
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: Comportamento esperado
      description: Descreva o que deveria acontecer.
    validations:
      required: true

  - type: textarea
    id: atual
    attributes:
      label: Comportamento atual
      description: Descreva o que acontece hoje.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Adicione capturas de tela, se aplicável.
      placeholder: Arraste e solte imagens aqui.

  - type: textarea
    id: ambiente
    attributes:
      label: Ambiente
      description: Informe navegador, sistema operacional e versão do app.
      placeholder: |
        Browser: Chrome 136
        SO: Windows 11
        Versão: 1.0.0
    validations:
      required: true
