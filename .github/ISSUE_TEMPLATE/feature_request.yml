name: Solicitação de feature
description: Sugira uma melhoria para o projeto
title: "[FEATURE] "
labels:
  - enhancement
body:
  - type: textarea
    id: problema
    attributes:
      label: Problema / motivação
      description: Qual problema essa feature resolve?
    validations:
      required: true

  - type: textarea
    id: solucao
    attributes:
      label: Solução proposta
      description: Como você imagina que a solução funcione?
    validations:
      required: true

  - type: textarea
    id: alternativas
    attributes:
      label: Alternativas consideradas
      description: Quais alternativas você já avaliou?

  - type: textarea
    id: contexto
    attributes:
      label: Contexto adicional
      description: Links, screenshots ou informações úteis.
